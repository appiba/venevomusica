<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venevo Música</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="lafan-theme">

  <main class="app">

    <section class="hero">
      <div class="brand">
        <span>VENEVO MÚSICA</span>
        <h1 id="mainTitle">LA FAN FM</h1>
        <p id="mainSubtitle">Tu radio en vivo, música y energía en un solo lugar.</p>
      </div>

      <div class="player-card">
        <div class="cover">
          <img id="coverImage" src="assets/lafan-cover.jpg" alt="Radio cover" />
        </div>

        <div class="radio-info">
          <p class="live">● EN VIVO</p>
          <h2 id="radioTitle">LA FAN FM</h2>
          <p id="radioText">Escucha la radio online desde cualquier lugar.</p>
        </div>

        <button id="playBtn" class="play-btn">▶</button>

        <div class="visualizer">
          <span></span><span></span><span></span><span></span><span></span>
        </div>

        <audio id="radioPlayer" src="https://radio.megahostec.com/listen/radio_la_fan_fm/stream"></audio>
      </div>
    </section>

    <section class="radios">
      <h3>Radios disponibles</h3>

      <div class="radio-slider">

        <div class="radio-card active-radio"
          data-name="LA FAN FM"
          data-theme="lafan-theme"
          data-stream="https://radio.megahostec.com/listen/radio_la_fan_fm/stream"
          data-image="assets/lafan-cover.jpg"
          data-subtitle="Tu radio en vivo, música y energía en un solo lugar.">

          <img src="assets/lafan-cover.jpg" alt="LA FAN FM">

          <div class="radio-overlay">
            <h4>LA FAN FM</h4>
            <p>Radio en vivo</p>
          </div>
        </div>

        <div class="radio-card"
          data-name="DOBLE CLIP FM"
          data-theme="clip-theme"
          data-stream="https://radio.megahostec.com/listen/radio_clipfm/stream"
          data-image="assets/clipfm-cover.jpg"
          data-subtitle="La radio con ritmo, frescura y buena música.">

          <img src="assets/clipfm-cover.jpg" alt="DOBLE CLIP FM">

          <div class="radio-overlay">
            <h4>DOBLE CLIP FM</h4>
            <p>Radio en vivo</p>
          </div>
        </div>

      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
