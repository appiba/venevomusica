<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venevo Música</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="lafan-theme">

  <section id="splashScreen" class="splash-screen">
    <video id="splashVideo" autoplay muted playsinline preload="auto">
      <source src="venevologovideo.mp4" type="video/mp4">
    </video>
  </section>

  <main class="app">

    <header class="top-header">
      <div>
        <p class="mini-title">VENEVO MÚSICA</p>
        <h1 id="radioNameTop">LA FAN</h1>
      </div>
      <div class="live-box">● EN VIVO</div>
    </header>

    <div class="switch-container">
      <button id="radioTab" class="switch-btn active-switch">RADIO</button>
      <button id="streamingTab" class="switch-btn">STREAMING</button>
    </div>

    <section id="radioSection">

      <div id="dialArea" class="dial-container">

        <button id="prevRadio" class="nav-arrow left-arrow">‹</button>

        <div id="dialWrapper" class="dial-wrapper">
          <div class="dial-ring"></div>
          <div class="dial-ring second-ring"></div>

          <div class="dial-center">
            <span class="playing-text">SONANDO AHORA</span>
            <h2 id="dialNumber">90.5</h2>
            <h3 id="dialRadioName">LA FAN</h3>
            <p id="dialSubtitle">POP • TOP HITS</p>

            <div class="waveform">
              <span></span><span></span><span></span>
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>

        <button id="nextRadio" class="nav-arrow right-arrow">›</button>

      </div>

      <div class="player-card">

        <div class="song-box">
          <video id="radioLogoVideo" autoplay muted loop playsinline></video>

          <div class="song-info">
            <span class="song-live">EN VIVO</span>
            <h3 id="radioTitle">LA FAN</h3>
            <p>Escucha la radio online desde cualquier lugar.</p>
          </div>
        </div>

        <div class="controls">
          <button id="prevRadioBottom" class="control-btn">‹</button>
          <button id="playBtn" class="play-btn">▶</button>
          <button id="nextRadioBottom" class="control-btn">›</button>
        </div>

      </div>

    </section>

    <section id="streamingSection" class="hidden">
      <iframe id="streamingFrame" allowfullscreen frameborder="0"></iframe>
    </section>

  </main>

  <audio id="radioPlayer"></audio>

  <script src="script.js"></script>
</body>
</html>
