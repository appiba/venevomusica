<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VENEVO MÚSICA</title>

  <link rel="stylesheet" href="style.css">
</head>

<body class="lafan-theme">

<div class="app">

  <!-- SPLASH -->
  <section id="splashScreen" class="splash-screen">
    <video autoplay muted playsinline id="splashVideo">
      <source src="venevologovideo.mp4" type="video/mp4">
    </video>
  </section>

  <!-- APP -->
  <section id="mainApp" class="hidden">

    <!-- HEADER -->
    <header class="top-header">

      <div>
        <p class="mini-title">VENEVO MÚSICA</p>
        <h1 id="radioNameTop">LA FAN</h1>
      </div>

      <div class="live-box">
        ● EN VIVO
      </div>

    </header>

    <!-- SWITCH -->
    <div class="switch-container">

      <button class="switch-btn active-switch" id="radioTab">
        RADIO
      </button>

      <button class="switch-btn" id="streamingTab">
        STREAMING
      </button>

    </div>

    <!-- RADIO -->
    <section id="radioSection">

      <!-- DIAL -->
      <div class="dial-container">

        <button class="nav-arrow left-arrow" id="prevRadio">
          ‹
        </button>

        <div class="dial-wrapper">

          <div class="dial-ring"></div>

          <div class="dial-ring second-ring"></div>

          <div class="dial-center">

            <span class="playing-text">
              SONANDO AHORA
            </span>

            <h2 id="dialNumber">
              90.5
            </h2>

            <h3 id="dialRadioName">
              LA FAN
            </h3>

            <p id="dialSubtitle">
              POP • TOP HITS
            </p>

            <div class="waveform">
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
              <span></span>
            </div>

          </div>

        </div>

        <button class="nav-arrow right-arrow" id="nextRadio">
          ›
        </button>

      </div>

      <!-- PLAYER -->
      <div class="player-card">

        <div class="song-box">

          <video
            id="radioLogoVideo"
            autoplay
            muted
            loop
            playsinline>
          </video>

          <div class="song-info">

            <span class="song-live">
              EN VIVO
            </span>

            <h3 id="radioTitle">
              LA FAN
            </h3>

            <p>
              Escucha la radio online desde cualquier lugar.
            </p>

          </div>

        </div>

        <!-- CONTROLS -->
        <div class="controls">

          <button class="control-btn">
            ⏮
          </button>

          <button id="playBtn" class="play-btn">
            ▶
          </button>

          <button class="control-btn">
            ⏭
          </button>

        </div>

      </div>

    </section>

    <!-- STREAMING -->
    <section id="streamingSection" class="hidden">

      <iframe
        id="streamingFrame"
        allowfullscreen
        frameborder="0">
      </iframe>

    </section>

  </section>

</div>

<audio id="radioPlayer"></audio>

<script src="script.js"></script>

</body>
</html>
