<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venevo Música</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="lafan-theme">

  <section id="splashScreen" class="splash-screen">
    <video id="splashVideo" autoplay muted playsinline preload="auto">
      <source src="venevologovideo.mp4" type="video/mp4">
    </video>
  </section>

  <main class="app">

    <section class="hero">

      <div class="brand">
        <span>VENEVO MÚSICA</span>
        <h1 id="mainTitle">LA FAN FM</h1>
        <p id="mainSubtitle">Tu radio en vivo, música y energía en un solo lugar.</p>
      </div>

      <div id="playerCard" class="player-card">

        <div id="coverBox" class="cover">
          <video id="coverMedia" autoplay muted loop playsinline src="introlafanlogo.mp4"></video>
        </div>

        <div class="radio-info">
          <p class="live">● EN VIVO</p>
          <h2 id="radioTitle">LA FAN FM</h2>
          <p id="radioText">Escucha la radio online desde cualquier lugar.</p>
        </div>

        <button id="playBtn" class="play-btn">▶</button>

        <div class="visualizer">
          <span></span><span></span><span></span><span></span><span></span>
        </div>

        <div class="swipe-text">Desliza para cambiar de radio</div>

        <audio id="radioPlayer" src="https://radio.megahostec.com/listen/radio_la_fan_fm/stream"></audio>

      </div>

      <div class="dots">
        <span class="dot active-dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>

    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
