<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Venevo Música</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="lafan-theme">

  <section id="splashScreen" class="splash-screen">
    <video id="splashVideo" autoplay muted playsinline>
      <source src="venevelogovideo.mp4" type="video/mp4">
    </video>
  </section>

  <main class="app">

    <section class="hero">

      <div class="brand">
        <span>VENEVO MÚSICA</span>
        <h1 id="mainTitle">LA FAN FM</h1>
        <p id="mainSubtitle">Tu radio en vivo, música y energía en un solo lugar.</p>
      </div>

      <div class="player-card">

        <div class="cover">
          <video
            id="coverImage"
            autoplay
            muted
            loop
            playsinline
            src="introlafanlogo.mp4">
          </video>
        </div>

        <div class="radio-info">
          <p class="live">● EN VIVO</p>
          <h2 id="radioTitle">LA FAN FM</h2>
          <p id="radioText">Escucha la radio online desde cualquier lugar.</p>
        </div>

        <button id="playBtn" class="play-btn">▶</button>

        <div class="visualizer">
          <span></span><span></span><span></span><span></span><span></span>
        </div>

        <audio
          id="radioPlayer"
          src="https://radio.megahostec.com/listen/radio_la_fan_fm/stream">
        </audio>

      </div>

    </section>

    <section class="radios">
      <h3>Radios disponibles</h3>

      <div class="radio-slider">

        <div
          class="radio-card active-radio"
          data-name="LA FAN FM"
          data-theme="lafan-theme"
          data-stream="https://radio.megahostec.com/listen/radio_la_fan_fm/stream"
          data-video="introlafanlogo.mp4"
          data-subtitle="Tu radio en vivo, música y energía en un solo lugar.">
          <video autoplay muted loop playsinline src="introlafanlogo.mp4"></video>
          <div class="radio-overlay">
            <h4>LA FAN FM</h4>
            <p>Entrar a radio</p>
          </div>
        </div>

        <div
          class="radio-card"
          data-name="DOBLE CLIP FM"
          data-theme="clip-theme"
          data-stream="https://radio.megahostec.com/listen/radio_clipfm/stream"
          data-video="introcliplogo.mp4"
          data-subtitle="La radio con ritmo, frescura y buena música.">
          <video autoplay muted loop playsinline src="introcliplogo.mp4"></video>
          <div class="radio-overlay">
            <h4>DOBLE CLIP FM</h4>
            <p>Entrar a radio</p>
          </div>
        </div>

        <div
          class="radio-card"
          data-name="OYE FM"
          data-theme="oye-theme"
          data-stream="https://radio.megahostec.com/listen/radio_oyefm/stream"
          data-video="introoyelogo.mp4"
          data-subtitle="La radio joven, dinámica y llena de energía.">
          <video autoplay muted loop playsinline src="introoyelogo.mp4"></video>
          <div class="radio-overlay">
            <h4>OYE FM</h4>
            <p>Entrar a radio</p>
          </div>
        </div>

        <div
          class="radio-card"
          data-name="POX FM"
          data-theme="pox-theme"
          data-stream="https://radio.megahostec.com/listen/radio_pox_edmo/stream"
          data-video="intropoxlogo.mp4"
          data-subtitle="Música, entretenimiento y energía en vivo.">
          <video autoplay muted loop playsinline src="intropoxlogo.mp4"></video>
          <div class="radio-overlay">
            <h4>POX FM</h4>
            <p>Entrar a radio</p>
          </div>
        </div>

      </div>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
